name: Daily EOD Pipeline

on:
  schedule:
    # 9:30 PM ET = 01:30 UTC (Mon-Fri)
    # yfinance EOD data typically available ~30 min after close
    - cron: '30 1 * * 1-5'
  workflow_dispatch:
    inputs:
      start_step:
        description: 'Start from step N (1-8, default 1)'
        required: false
        default: '1'

env:
  PYTHONIOENCODING: utf-8
  MARKET_INGEST_WORKERS: "8"
  MARKET_INGEST_LOOKBACK_DAYS: "3"
  NEWS_INGEST_ENABLED: "0"
  NEWS_SYMBOL_LIMIT: "150"
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  REDIS_URL: ${{ secrets.REDIS_URL }}
  FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
  FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
  OPENROUTER_MODEL_NAME: ${{ secrets.OPENROUTER_MODEL_NAME }}
  MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
  MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
  MLFLOW_TRACKING_TOKEN: ${{ secrets.MLFLOW_TRACKING_TOKEN }}

jobs:
  daily-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Force IPv4 DNS resolution (GH Actions runners lack IPv6 connectivity)
        run: |
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.lo.disable_ipv6=1
          echo "precedence ::ffff:0:0/96 100" | sudo tee -a /etc/gai.conf
          # Pin Supabase hostname to its IPv4 address
          IPV4=$(dig +short A db.lyokdqqwlunyicwbrqny.supabase.co | head -1)
          if [ -n "$IPV4" ]; then
            echo "$IPV4 db.lyokdqqwlunyicwbrqny.supabase.co" | sudo tee -a /etc/hosts
            echo "Pinned db.lyokdqqwlunyicwbrqny.supabase.co -> $IPV4"
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate DATABASE_URL format (Supabase pooler)
        run: |
          python - <<'PY'
          import os
          import sys
          from urllib.parse import urlparse

          url = os.environ.get("DATABASE_URL", "")
          if not url:
              print("ERROR: DATABASE_URL secret is empty.")
              sys.exit(1)

          p = urlparse(url)
          host = p.hostname or ""
          user = p.username or ""
          port = p.port
          db = (p.path or "").lstrip("/")

          print(f"DB host={host}, port={port}, db={db}, user_prefix={(user.split('.')[0] if user else '')}")

          if "pooler.supabase.com" in host:
              if "." not in user:
                  print("ERROR: Supabase pooler URL must use user 'postgres.<project-ref>', not plain 'postgres'.")
                  print("Fix DATABASE_URL secret using Supabase -> Database -> Connection pooling -> URI.")
                  sys.exit(1)
          elif host.startswith("db.") and host.endswith(".supabase.co"):
              print("ERROR: Direct Supabase host is IPv6-only for this project. Use pooler host on port 6543.")
              sys.exit(1)

          if port != 6543:
              print("WARNING: Expected pooler port 6543.")
          if not db:
              print("WARNING: Database name missing in URL path.")
          PY

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install lxml scipy

      - name: Run daily pipeline
        run: |
          STEP="${{ github.event.inputs.start_step || '1' }}"
          echo "Starting from step $STEP"
          python -m scripts.daily_pipeline --step "$STEP"

      - name: Commit paper trading results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add artifacts/paper_trading/ || true
          if git diff --cached --quiet; then
            echo "No paper trading changes to commit"
          else
            git commit -m "paper trading: $(date -u +%Y-%m-%d) daily update

          Automated daily paper trading log and position update."
            git push
          fi

      - name: Print paper trading dashboard
        if: always()
        run: python -m scripts.paper_trading_monitor --report-only

      - name: Write job summary
        if: always()
        run: |
          echo "## Daily Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f artifacts/paper_trading/daily_log.csv ]; then
            DAYS=$(wc -l < artifacts/paper_trading/daily_log.csv)
            DAYS=$((DAYS - 1))
            echo "**Paper trading days logged:** $DAYS" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Latest entries</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -5 artifacts/paper_trading/daily_log.csv >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          else
            echo "No paper trading data yet." >> $GITHUB_STEP_SUMMARY
          fi
