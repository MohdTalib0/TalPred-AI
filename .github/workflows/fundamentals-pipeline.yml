# Heavy fundamentals upsert (~tens of thousands of rows). Kept separate from the 90-min
# daily EOD workflow so this job can use a long timeout and not block the rest of the pipeline.
name: Weekly Fundamentals Ingest

on:
  schedule:
    # Monday 03:00 UTC — after daily EOD (01:30 UTC); adjust if you change PIPELINE_CALENDAR_TZ
    - cron: '0 3 * * 1'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Run even if not Monday (recovery)'
        required: false
        default: false
        type: boolean

env:
  PYTHONIOENCODING: utf-8
  FUNDAMENTALS_INGEST_IN_CI: "1"
  PIPELINE_CALENDAR_TZ: UTC
  FUNDAMENTAL_LOOKBACK_YEARS: "2"
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  REDIS_URL: ${{ secrets.REDIS_URL }}
  FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
  FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
  OPENROUTER_MODEL_NAME: ${{ secrets.OPENROUTER_MODEL_NAME }}
  MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
  MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
  MLFLOW_TRACKING_TOKEN: ${{ secrets.MLFLOW_TRACKING_TOKEN }}
  SIMFIN_API_KEY: ${{ secrets.SIMFIN_API_KEY }}

jobs:
  fundamentals:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Force IPv4 DNS resolution (GH Actions runners lack IPv6 connectivity)
        run: |
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.lo.disable_ipv6=1
          echo "precedence ::ffff:0:0/96 100" | sudo tee -a /etc/gai.conf
          IPV4=$(dig +short A db.lyokdqqwlunyicwbrqny.supabase.co | head -1)
          if [ -n "$IPV4" ]; then
            echo "$IPV4 db.lyokdqqwlunyicwbrqny.supabase.co" | sudo tee -a /etc/hosts
            echo "Pinned db.lyokdqqwlunyicwbrqny.supabase.co -> $IPV4"
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate DATABASE_URL format (Supabase pooler)
        run: |
          python - <<'PY'
          import os
          import sys
          from urllib.parse import urlparse

          url = os.environ.get("DATABASE_URL", "")
          if not url:
              print("ERROR: DATABASE_URL secret is empty.")
              sys.exit(1)

          p = urlparse(url)
          host = p.hostname or ""
          user = p.username or ""
          port = p.port
          db = (p.path or "").lstrip("/")

          print(f"DB host={host}, port={port}, db={db}, user_prefix={(user.split('.')[0] if user else '')}")

          if "pooler.supabase.com" in host:
              if "." not in user:
                  print("ERROR: Supabase pooler URL must use user 'postgres.<project-ref>', not plain 'postgres'.")
                  print("Fix DATABASE_URL secret using Supabase -> Database -> Connection pooling -> URI.")
                  sys.exit(1)
          elif host.startswith("db.") and host.endswith(".supabase.co"):
              print("ERROR: Host db.*.supabase.co is the DIRECT DB (IPv6-only on GitHub runners).")
              print("       Port 6543 alone is not enough — you need the TRANSACTION POOLER hostname.")
              print("       Supabase Dashboard → Project Settings → Database → Connection string →")
              print("       URI → Transaction pooler (host like aws-0-<region>.pooler.supabase.com).")
              print("       User must be postgres.<project-ref>, not plain postgres.")
              sys.exit(1)

          if port != 6543:
              print("WARNING: Expected pooler port 6543.")
          if not db:
              print("WARNING: Database name missing in URL path.")
          PY

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install lxml scipy

      - name: Run fundamentals ingest (step 10 only)
        env:
          # Only set on workflow_dispatch; scheduled runs omit override (Monday-only).
          FUNDAMENTALS_FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_run == 'true' && '1' || '0' }}
        run: python -m scripts.daily_pipeline --step 10

      - name: Write job summary
        if: always()
        run: |
          echo "## Fundamentals ingest" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Timezone:** PIPELINE_CALENDAR_TZ=$PIPELINE_CALENDAR_TZ (Monday = weekday 0 in that zone)" >> $GITHUB_STEP_SUMMARY
